name: Update Remaining Estimate

on:
  issues:
    types: [edited, opened, reopened]

jobs:
  update-remaining:
    runs-on: ubuntu-latest

    steps:
      - name: Calculate Remaining Estimate
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const projectId = "PVT_kwHOD3BjlM4BUQi3";
            const originalFieldId = "PVTF_lAHOD3BjlM4BUQi3zhBaaG8";
            const timeSpentFieldId = "PVTF_lAHOD3BjlM4BUQi3zhBaaIs";
            const remainingFieldId = "PVTF_lAHOD3BjlM4BUQi3zhBaaQk";

            const issueNodeId = context.payload.issue.node_id;

            // Fetch project item linked to this issue
            const query = `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          id
                        }
                        fieldValues(first: 20) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldNumberValue {
                              field {
                                ... on ProjectV2FieldCommon {
                                  id
                                  name
                                }
                              }
                              number
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              issueId: issueNodeId
            });

            const items = result.node.projectItems.nodes;

            for (const item of items) {
              if (item.project.id !== projectId) continue;

              let original = 0;
              let spent = 0;

              for (const field of item.fieldValues.nodes) {
                if (field.field.id === originalFieldId) {
                  original = field.number || 0;
                }
                if (field.field.id === timeSpentFieldId) {
                  spent = field.number || 0;
                }
              }

              const remaining = original - spent;

              // Update Remaining field
              const mutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: { number: $value }
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `;

              await github.graphql(mutation, {
                projectId: projectId,
                itemId: item.id,
                fieldId: remainingFieldId,
                value: remaining
              });

              console.log(`Updated Remaining = ${remaining}`);
            }
