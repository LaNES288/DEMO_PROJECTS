name: Export GitHub Project to Excel

env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: |
      python <<EOF
      import requests
      import pandas as pd
      import os

      token = os.environ["GITHUB_TOKEN"]

      # 🔥 CHANGE THIS
      PROJECT_ID = "PVT_kwHOD3BjlM4BUQi3"

      url = "https://api.github.com/graphql"

      headers = {
        "Authorization": f"Bearer {token}"
      }

      query = """
      query ($projectId: ID!) {
      node(id: $projectId) {
        ... on ProjectV2 {
          items(first: 100) {
            nodes {
              content {
                ... on Issue {
                  number
                  title
                  state
                }
              }
              fieldValues(first: 20) {
                nodes {
                  ... on ProjectV2ItemFieldNumberValue {
                    number
                    field {
                      ... on ProjectV2FieldCommon {
                        name
                      }
                    }
                  }
                  ... on ProjectV2ItemFieldTextValue {
                    text
                    field {
                      ... on ProjectV2FieldCommon {
                        name
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
      }
      """

      response = requests.post(
        url,
        json={"query": query, "variables": {"projectId": PROJECT_ID}},
        headers=headers
      )

      data = response.json()

      items = data["data"]["node"]["items"]["nodes"]

      rows = []

      for item in items:
        issue = item.get("content")
        if not issue:
            continue

        row = {
            "ID": issue["number"],
            "Title": issue["title"],
            "State": issue["state"],
            "Original Estimate Days": None,
            "Time Spent Days": None,
            "Remaining Estimate Days": None
        }

        for field in item["fieldValues"]["nodes"]:
            field_name = field["field"]["name"]

            if "number" in field:
                value = field["number"]
            elif "text" in field:
                value = field["text"]
            else:
                continue

            if field_name == "Original Estimate Days":
                row["Original Estimate Days"] = value
            elif field_name == "Time Spent Days":
                row["Time Spent Days"] = value
            elif field_name == "Remaining Estimate Days":
                row["Remaining Estimate Days"] = value

        rows.append(row)

    df = pd.DataFrame(rows)
    df.to_excel("github_project_report.xlsx", index=False)

    print(f"Exported {len(df)} items")
    EOF
